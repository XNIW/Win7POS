name: Catalog Performance

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  catalog-benchmark:
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: "true"
      DOTNET_CLI_TELEMETRY_OPTOUT: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Resolve exact-SHA build version
        shell: pwsh
        env:
          WIN7POS_EXACT_SHA: ${{ github.sha }}
        run: pwsh -NoProfile -File scripts/win7pos/windows/resolve-release-version.ps1 -CommitSha $env:WIN7POS_EXACT_SHA -Ref $env:GITHUB_REF -GitHubEnvironmentFile $env:GITHUB_ENV

      - name: Setup deterministic .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json

      - name: Restore solution
        run: dotnet restore Win7POS.slnx --locked-mode

      - name: Build benchmark and tests
        run: dotnet build Win7POS.slnx -c Release --no-restore

      - name: Benchmark legacy vs batch (2,000 rows)
        shell: pwsh
        env:
          WIN7POS_RUN_CATALOG_BENCHMARK: "1"
          WIN7POS_CATALOG_BENCHMARK_ROWS: "2000"
          WIN7POS_CATALOG_BENCHMARK_ITERATIONS: "3"
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/performance | Out-Null
          dotnet test tests/Win7POS.Core.Tests/Win7POS.Core.Tests.csproj `
            -c Release --no-build --no-restore `
            --filter "FullyQualifiedName~CatalogBatchPerformanceTests" `
            --results-directory artifacts/performance `
            --logger "trx;LogFileName=catalog-performance-2000.trx"
          if ($LASTEXITCODE -ne 0) { throw "2,000-row catalog benchmark failed." }

          [xml]$trx = Get-Content -LiteralPath artifacts/performance/catalog-performance-2000.trx -Raw
          $evidence = @($trx.SelectNodes("//*[local-name()='StdOut']") | ForEach-Object { $_.InnerText })
          if ($evidence.Count -eq 0) { throw "2,000-row benchmark produced no textual evidence." }
          $evidence | Set-Content -LiteralPath artifacts/performance/catalog-performance-2000.txt -Encoding utf8

      - name: Benchmark full path (19,763 rows)
        shell: pwsh
        env:
          WIN7POS_RUN_CATALOG_BENCHMARK: "1"
          WIN7POS_CATALOG_BENCHMARK_ROWS: "19763"
          WIN7POS_CATALOG_BENCHMARK_ITERATIONS: "3"
          WIN7POS_CATALOG_BENCHMARK_MODE: "batch-paged-full"
          WIN7POS_CATALOG_BENCHMARK_PAGE_SIZE: "1000"
        run: |
          dotnet test tests/Win7POS.Core.Tests/Win7POS.Core.Tests.csproj `
            -c Release --no-build --no-restore `
            --filter "FullyQualifiedName~CatalogBatchPerformanceTests" `
            --results-directory artifacts/performance `
            --logger "trx;LogFileName=catalog-performance-19763.trx"
          if ($LASTEXITCODE -ne 0) { throw "19,763-row catalog benchmark failed." }

          [xml]$trx = Get-Content -LiteralPath artifacts/performance/catalog-performance-19763.trx -Raw
          $evidence = @($trx.SelectNodes("//*[local-name()='StdOut']") | ForEach-Object { $_.InnerText })
          if ($evidence.Count -eq 0) { throw "19,763-row benchmark produced no textual evidence." }
          $evidence | Set-Content -LiteralPath artifacts/performance/catalog-performance-19763.txt -Encoding utf8

      - name: Benchmark incremental deltas (10, 100 and 1,000 rows)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $evidencePath = "artifacts/performance/catalog-delta-net10-x64.txt"
          foreach ($rows in @(10, 100, 1000)) {
            $output = @(& dotnet run `
              --project tests/Win7POS.CatalogPerformance/Win7POS.CatalogPerformance.csproj `
              -f net10.0 -c Release --no-build --no-restore -- `
              batch-delta $rows 1 1000)
            if ($LASTEXITCODE -ne 0) { throw "$rows-row catalog delta benchmark failed." }
            if (($output -join "`n") -notmatch "products=19763") {
              throw "$rows-row delta did not preserve the 19,763-row catalog."
            }
            $output | Add-Content -LiteralPath $evidencePath -Encoding utf8
          }

      - name: Benchmark actual net48 x86 full path
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $exe = "tests/Win7POS.CatalogPerformance/bin/Release/net48/Win7POS.CatalogPerformance.exe"
          if (!(Test-Path -LiteralPath $exe -PathType Leaf)) {
            throw "net48/x86 benchmark executable missing: $exe"
          }
          $warmupCount = 2
          $measuredCount = 20
          $totalCount = $warmupCount + $measuredCount
          $output = @(& $exe batch-paged-full 19763 $totalCount 1000)
          $benchmarkExitCode = $LASTEXITCODE
          $evidencePath = "artifacts/performance/catalog-performance-19763-net48-x86.txt"
          $output | Set-Content -LiteralPath $evidencePath -Encoding utf8
          if ($benchmarkExitCode -ne 0) { throw "net48/x86 catalog benchmark failed with exit code $benchmarkExitCode. Evidence: $evidencePath" }
          $text = $output -join "`n"
          if ($text -notmatch "is_64_bit=False") { throw "Catalog benchmark did not run as x86." }
          $sampleLines = @($output | Where-Object { $_ -match "^iteration=" })
          if ($sampleLines.Count -ne $totalCount) {
            throw "net48/x86 catalog benchmark produced $($sampleLines.Count) of $totalCount samples. Evidence: $evidencePath"
          }
          $measuredLines = @($sampleLines | Select-Object -Skip $warmupCount)
          $verifiedCount = @($measuredLines | Where-Object { $_ -match "completeness=Verified" }).Count
          $exactCount = @($measuredLines | Where-Object {
            $_ -match "products=19763" -and
            $_ -match "prices=19763" -and
            $_ -match "pending=0"
          }).Count
          if ($verifiedCount -ne $measuredCount -or $exactCount -ne $measuredCount) {
            throw "net48/x86 exactness invalid: verified=$verifiedCount/$measuredCount exact=$exactCount/$measuredCount. Evidence: $evidencePath"
          }

          $elapsed = @($measuredLines | ForEach-Object {
            [double]([regex]::Match($_, "elapsed_ms=([0-9.]+)").Groups[1].Value)
          } | Sort-Object)
          $p50 = ($elapsed[9] + $elapsed[10]) / 2.0
          $p90 = $elapsed[[Math]::Ceiling(0.90 * $measuredCount) - 1]
          $p95 = $elapsed[[Math]::Ceiling(0.95 * $measuredCount) - 1]
          $maximum = ($elapsed | Measure-Object -Maximum).Maximum
          if ($p95 -gt 15000.0) {
            throw "net48/x86 19,763-row p95 exceeded 15 seconds: p95_ms=$p95. Evidence: $evidencePath"
          }

          $statementCounts = @($measuredLines | ForEach-Object {
            [long]([regex]::Match($_, "remote_price_apply_sql_statements=([0-9]+)").Groups[1].Value)
          } | Select-Object -Unique)
          $commandCounts = @($measuredLines | ForEach-Object {
            [long]([regex]::Match($_, "remote_price_apply_sql_commands=([0-9]+)").Groups[1].Value)
          } | Select-Object -Unique)
          $contextCommandCounts = @($measuredLines | ForEach-Object {
            [long]([regex]::Match($_, "context_sql_commands=([0-9]+)").Groups[1].Value)
          } | Select-Object -Unique)
          $relinkStageCommandCounts = @($measuredLines | ForEach-Object {
            [long]([regex]::Match($_, "relink_stage_sql_commands=([0-9]+)").Groups[1].Value)
          } | Select-Object -Unique)
          if ($statementCounts.Count -ne 1 -or $statementCounts[0] -ne 536) {
            throw "net48/x86 set-based statement count invalid: values=$($statementCounts -join ','). Evidence: $evidencePath"
          }
          if ($commandCounts.Count -ne 1 -or $commandCounts[0] -ne 318) {
            throw "net48/x86 SQL command count is not deterministic: values=$($commandCounts -join ','). Evidence: $evidencePath"
          }
          if ($contextCommandCounts.Count -ne 1 -or $contextCommandCounts[0] -ne 301) {
            throw "net48/x86 bounded context command count invalid: values=$($contextCommandCounts -join ','). Evidence: $evidencePath"
          }
          if ($relinkStageCommandCounts.Count -ne 1 -or $relinkStageCommandCounts[0] -ne 20) {
            throw "net48/x86 relink staging is not page-bounded: values=$($relinkStageCommandCounts -join ','). Evidence: $evidencePath"
          }

          $gen2Counts = @($measuredLines | ForEach-Object {
            [long]([regex]::Match($_, "gc2=([0-9]+)").Groups[1].Value)
          })
          $maximumGen2 = ($gen2Counts | Measure-Object -Maximum).Maximum
          if ($gen2Counts.Count -ne $measuredCount -or $maximumGen2 -gt 5) {
            throw "net48/x86 bounded JSON staging caused excessive Gen2 collections: samples=$($gen2Counts.Count), max=$maximumGen2. Evidence: $evidencePath"
          }

          $peakWorkingSet = ($measuredLines | ForEach-Object {
            [long]([regex]::Match($_, "peak_working_set_bytes=([0-9]+)").Groups[1].Value)
          } | Measure-Object -Maximum).Maximum
          $peakPrivateBytes = ($measuredLines | ForEach-Object {
            [long]([regex]::Match($_, "peak_private_bytes=([0-9]+)").Groups[1].Value)
          } | Measure-Object -Maximum).Maximum
          $x86MemoryLimit = 96MB
          if ($peakWorkingSet -gt $x86MemoryLimit -or $peakPrivateBytes -gt $x86MemoryLimit) {
            throw "net48/x86 19,763-row memory exceeded 96 MiB: working_set=$peakWorkingSet private_bytes=$peakPrivateBytes. Evidence: $evidencePath"
          }

          $delays = @($measuredLines | ForEach-Object {
            [double]([regex]::Match($_, "dispatcher_max_delay_ms=([0-9.]+)").Groups[1].Value)
          })
          $delaySummary = if ($delays.Count -eq 0) { "none" } else { $delays -join ", " }
          $stableLimitMilliseconds = 150.0
          $hardLimitMilliseconds = 200.0
          $maximumDelay = if ($delays.Count -eq 0) { [double]::PositiveInfinity } else {
            ($delays | Measure-Object -Maximum).Maximum
          }
          $stableSampleCount = @($delays | Where-Object { $_ -le $stableLimitMilliseconds }).Count
          $orderedDelays = @($delays | Sort-Object)
          $medianDelay = if ($delays.Count -eq $measuredCount) {
            ($orderedDelays[9] + $orderedDelays[10]) / 2.0
          } else {
            [double]::PositiveInfinity
          }
          $summary = "measured=$measuredCount warmups=$warmupCount p50_ms=$p50 p90_ms=$p90 p95_ms=$p95 max_ms=$maximum context_sql_commands=$($contextCommandCounts[0]) relink_stage_sql_commands=$($relinkStageCommandCounts[0]) sql_commands=$($commandCounts[0]) sql_statements=$($statementCounts[0]) max_gen2=$maximumGen2 peak_working_set_bytes=$peakWorkingSet peak_private_bytes=$peakPrivateBytes dispatcher_median_ms=$medianDelay dispatcher_max_ms=$maximumDelay"
          $summary | Add-Content -LiteralPath $evidencePath -Encoding utf8
          Write-Host "net48/x86 19,763 summary: $summary"
          Write-Host "net48/x86 dispatcher delays (ms): values=[$delaySummary], stable_samples=$stableSampleCount/$measuredCount"

          # GitHub-hosted Windows runners are not real-time systems. The probe runs on a
          # dedicated STA dispatcher, so one scheduler/VM pause can delay it even when the
          # catalog path is not blocking that dispatcher. Require a reproducible <=150 ms
          # result (the median and at least 18 of 20 samples), while retaining a 200 ms
          # hard ceiling so a material single-sample stall still fails the gate.
          if ($delays.Count -ne $measuredCount -or
              $medianDelay -gt $stableLimitMilliseconds -or
              $stableSampleCount -lt 18 -or
              $maximumDelay -gt $hardLimitMilliseconds) {
            throw "net48/x86 dispatcher responsiveness invalid: samples=$($delays.Count), median_ms=$medianDelay, stable_limit_ms=$stableLimitMilliseconds, stable_samples=$stableSampleCount/$measuredCount, max_ms=$maximumDelay, hard_limit_ms=$hardLimitMilliseconds, values_ms=[$delaySummary]. Evidence: $evidencePath"
          }

      - name: Probe 100,000-row bounded authoritative path
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $net10Evidence = "artifacts/performance/catalog-bounded-full-100000-net10-x64.txt"
          $net10 = @(& dotnet run `
            --project tests/Win7POS.CatalogPerformance/Win7POS.CatalogPerformance.csproj `
            -f net10.0 -c Release --no-build --no-restore -- `
            batch-paged-full 100000 1 1000)
          $net10Exit = $LASTEXITCODE
          $net10 | Set-Content -LiteralPath $net10Evidence -Encoding utf8
          if ($net10Exit -ne 0) { throw "net10/x64 100,000-row probe failed. Evidence: $net10Evidence" }

          $net48Evidence = "artifacts/performance/catalog-bounded-full-100000-net48-x86.txt"
          $exe = "tests/Win7POS.CatalogPerformance/bin/Release/net48/Win7POS.CatalogPerformance.exe"
          $net48 = @(& $exe batch-paged-full 100000 1 1000)
          $net48Exit = $LASTEXITCODE
          $net48 | Set-Content -LiteralPath $net48Evidence -Encoding utf8
          if ($net48Exit -ne 0) { throw "net48/x86 100,000-row probe failed. Evidence: $net48Evidence" }

          foreach ($probe in @(
            @{ Name = "net10/x64"; Text = ($net10 -join "`n"); Path = $net10Evidence },
            @{ Name = "net48/x86"; Text = ($net48 -join "`n"); Path = $net48Evidence }
          )) {
            if ($probe.Text -notmatch "products=100000" -or
                $probe.Text -notmatch "prices=100000" -or
                $probe.Text -notmatch "completeness=Verified" -or
                $probe.Text -notmatch "authoritative_stage_rows_after=0") {
              throw "$($probe.Name) 100,000-row exactness/bounded-stage evidence is incomplete. Evidence: $($probe.Path)"
            }
          }
          if (($net48 -join "`n") -notmatch "is_64_bit=False") {
            throw "100,000-row net48 probe did not execute as x86. Evidence: $net48Evidence"
          }
          $x86Text = $net48 -join "`n"
          if ($x86Text -notmatch "relink_stage_sql_commands=100") {
            throw "100,000-row net48 relink staging is not bounded to one command per page. Evidence: $net48Evidence"
          }
          if ($x86Text -notmatch "context_sql_commands=1503" -or
              $x86Text -notmatch "remote_price_apply_sql_commands=1600" -or
              $x86Text -notmatch "remote_price_apply_sql_statements=2700") {
            throw "100,000-row net48 bounded SQL command evidence is invalid. Evidence: $net48Evidence"
          }
          $gen2Collections = [long]([regex]::Match($x86Text, "gc2=([0-9]+)").Groups[1].Value)
          if ($gen2Collections -gt 5) {
            throw "100,000-row net48 bounded staging caused excessive Gen2 collections: $gen2Collections. Evidence: $net48Evidence"
          }
          $peakWorkingSet = [long]([regex]::Match($x86Text, "peak_working_set_bytes=([0-9]+)").Groups[1].Value)
          $peakPrivateBytes = [long]([regex]::Match($x86Text, "peak_private_bytes=([0-9]+)").Groups[1].Value)
          $x86MemoryLimit = 96MB
          if ($peakWorkingSet -le 0 -or $peakWorkingSet -gt $x86MemoryLimit) {
            throw "100,000-row x86 peak working set exceeded 96 MiB: $peakWorkingSet. Evidence: $net48Evidence"
          }
          if ($peakPrivateBytes -le 0 -or $peakPrivateBytes -gt $x86MemoryLimit) {
            throw "100,000-row x86 private bytes exceeded 96 MiB: $peakPrivateBytes. Evidence: $net48Evidence"
          }

      - name: Benchmark no-change skip (20 samples)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $exe = "tests/Win7POS.CatalogPerformance/bin/Release/net48/Win7POS.CatalogPerformance.exe"
          $evidencePath = "artifacts/performance/catalog-no-change-19763-net48-x86.txt"
          $output = @(& $exe batch-no-change 19763 20 1000)
          $exitCode = $LASTEXITCODE
          $output | Set-Content -LiteralPath $evidencePath -Encoding utf8
          if ($exitCode -ne 0) { throw "net48/x86 no-change benchmark failed. Evidence: $evidencePath" }
          $sampleLines = @($output | Where-Object { $_ -match "^iteration=" })
          if ($sampleLines.Count -ne 20) {
            throw "No-change benchmark produced $($sampleLines.Count) of 20 samples. Evidence: $evidencePath"
          }
          $exactCount = @($sampleLines | Where-Object {
            $_ -match "products=19763" -and
            $_ -match "prices=19763" -and
            $_ -match "pending=0" -and
            $_ -match "completeness=Verified" -and
            $_ -match "context_sql_commands=0" -and
            $_ -match "relink_stage_sql_commands=0" -and
            $_ -match "remote_price_apply_sql_statements=0"
          }).Count
          if ($exactCount -ne 20) {
            throw "No-change skip rewrote or changed catalog state: exact=$exactCount/20. Evidence: $evidencePath"
          }
          $elapsed = @($sampleLines | ForEach-Object {
            [double]([regex]::Match($_, "elapsed_ms=([0-9.]+)").Groups[1].Value)
          } | Sort-Object)
          $p95 = $elapsed[[Math]::Ceiling(0.95 * 20) - 1]
          if ($p95 -gt 1500.0) {
            throw "No-change p95 exceeded 1.5 seconds: p95_ms=$p95. Evidence: $evidencePath"
          }
          "samples=20 p95_ms=$p95 rewrites=0 price_history_inserts=0" |
            Add-Content -LiteralPath $evidencePath -Encoding utf8

      - name: Upload benchmark evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: Win7POS-Catalog-Performance-${{ github.run_id }}
          path: artifacts/performance/*
          if-no-files-found: error
          retention-days: 30
