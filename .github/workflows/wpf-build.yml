name: wpf-build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wpf:
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: "true"
      DOTNET_CLI_TELEMETRY_OPTOUT: "true"
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          persist-credentials: false
          ref: ${{ github.sha }}
      - name: Resolve exact-SHA build version
        shell: pwsh
        env:
          WIN7POS_EXACT_SHA: ${{ github.sha }}
        run: pwsh -NoProfile -File scripts/win7pos/windows/resolve-release-version.ps1 -CommitSha $env:WIN7POS_EXACT_SHA -Ref $env:GITHUB_REF -GitHubEnvironmentFile $env:GITHUB_ENV
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json
      - run: dotnet --info
      - run: dotnet restore src/Win7POS.Wpf/Win7POS.Wpf.csproj --locked-mode
      - name: Dialog standards check
        shell: pwsh
        run: pwsh -File scripts/check-dialog-standards.ps1
      - run: dotnet build src/Win7POS.Wpf/Win7POS.Wpf.csproj -c Release -p:Platform=x86 -p:PlatformTarget=x86 --no-restore
      - name: List WPF bin output
        run: Get-ChildItem -Path "src/Win7POS.Wpf/bin" -Recurse | Select-Object FullName
      - name: Upload WPF artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: Win7POS.Wpf-Release-x86
          path: src/Win7POS.Wpf/bin/**/Release/**
