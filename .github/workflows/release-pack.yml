name: Release Pack

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pack:
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: "true"
      DOTNET_CLI_TELEMETRY_OPTOUT: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup deterministic .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.301"

      - name: Print .NET info
        run: dotnet --info

      - name: Restore solution
        run: dotnet restore Win7POS.slnx

      - name: Run canonical required gates
        shell: pwsh
        run: pwsh -NoProfile -File scripts/check-required-gates.ps1

      - name: Build solution Release
        run: dotnet build Win7POS.slnx -c Release --no-restore

      - name: Test Core and Data
        run: dotnet test tests/Win7POS.Core.Tests/Win7POS.Core.Tests.csproj -c Release --no-build --no-restore

      - name: CLI selftest
        run: dotnet run --project src/Win7POS.Cli/Win7POS.Cli.csproj -c Release --no-build -- --selftest --keepdb

      - name: Build WPF Release x86
        run: dotnet build src/Win7POS.Wpf/Win7POS.Wpf.csproj -c Release -p:Platform=x86 -p:PlatformTarget=x86 --no-restore

      - name: Prepare and validate dist
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (Test-Path "dist/Win7POS") { Remove-Item -LiteralPath "dist/Win7POS" -Recurse -Force }
          New-Item -ItemType Directory -Force -Path "dist/Win7POS" | Out-Null

          $wpfOutput = "src/Win7POS.Wpf/bin/x86/Release/net48"
          if (!(Test-Path (Join-Path $wpfOutput "Win7POS.Wpf.exe"))) { throw "WPF x86 net48 output folder not found: $wpfOutput" }
          Copy-Item -Path (Join-Path $wpfOutput "*") -Destination "dist/Win7POS" -Recurse -Force
          Get-ChildItem -Path "dist/Win7POS" -Recurse -File -Filter "*.pdb" | Remove-Item -Force

          pwsh -NoProfile -File scripts/win7pos/windows/write-release-support-files.ps1 `
            -OutputDirectory dist/Win7POS `
            -Configuration Release `
            -Platform x86 `
            -SdkVersion 10.0.301 `
            -CommitSha $env:GITHUB_SHA `
            -Ref $env:GITHUB_REF_NAME `
            -GitHubRunNumber $env:GITHUB_RUN_NUMBER

          pwsh -NoProfile -File scripts/check-release-pack-completeness.ps1 -ReleasePackSource dist/Win7POS -WriteManifests
          pwsh -NoProfile -File scripts/check-required-gates.ps1 -ReleasePackSource dist/Win7POS

          $stamp = Get-Date -Format "yyyyMMdd_HHmm"
          $zip = "dist/Win7POS_$stamp.zip"
          if (Test-Path $zip) { Remove-Item -LiteralPath $zip -Force }
          Compress-Archive -Path "dist/Win7POS/*" -DestinationPath $zip -Force
          pwsh -NoProfile -File scripts/check-win7-runtime-release-validation.ps1 -ReleasePackSource $zip
          pwsh -NoProfile -File scripts/check-pos-online-linking-task084b.ps1 -ReleasePackSource $zip
          Write-Host "Created package: $zip"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $url = "https://jrsoftware.org/download.php/is.exe?site=1"
          $tmp = Join-Path $env:RUNNER_TEMP "innosetup.exe"
          Invoke-WebRequest -Uri $url -OutFile $tmp
          Start-Process -FilePath $tmp -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART","/SP-" -Wait
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) { throw "ISCC not found: $iscc" }

      - name: Build installer
        shell: pwsh
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "installer/Win7POS.iss"'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: Win7POS-Setup
          path: installer/output/*.exe
          retention-days: 14

      - name: Upload dist artifact
        uses: actions/upload-artifact@v6
        with:
          name: Win7POS-dist
          path: dist/Win7POS
          retention-days: 14

      - name: Upload release pack artifact
        uses: actions/upload-artifact@v6
        with:
          name: Win7POS-ReleasePack-x86
          path: dist/Win7POS_*.zip
          retention-days: 14
