name: Release Pack

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pack:
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: "true"
      DOTNET_CLI_TELEMETRY_OPTOUT: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Resolve exact-SHA release version
        shell: pwsh
        env:
          WIN7POS_EXACT_SHA: ${{ github.sha }}
        run: pwsh -NoProfile -File scripts/win7pos/windows/resolve-release-version.ps1 -CommitSha $env:WIN7POS_EXACT_SHA -Ref $env:GITHUB_REF -GitHubEnvironmentFile $env:GITHUB_ENV

      - name: Setup deterministic .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: global.json

      - name: Print .NET info
        run: dotnet --info

      - name: Restore solution
        run: dotnet restore Win7POS.slnx --locked-mode

      - name: Run canonical required gates
        shell: pwsh
        run: pwsh -NoProfile -File scripts/check-required-gates.ps1

      - name: Build solution Release
        run: dotnet build Win7POS.slnx -c Release --no-restore

      - name: Test Core and Data
        run: dotnet test tests/Win7POS.Core.Tests/Win7POS.Core.Tests.csproj -c Release --no-build --no-restore

      - name: CLI selftest
        run: dotnet run --project src/Win7POS.Cli/Win7POS.Cli.csproj -c Release --no-build --no-restore -- --selftest --keepdb

      - name: Build WPF Release x86
        run: dotnet build src/Win7POS.Wpf/Win7POS.Wpf.csproj -c Release -p:Platform=x86 -p:PlatformTarget=x86 --no-restore

      - name: Install pinned Inno Setup
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $toolDirectory = Join-Path $env:RUNNER_TEMP "win7pos-inno-6.7.3"
          $isccOutput = @(& pwsh -NoProfile -File scripts/win7pos/windows/install-pinned-inno-setup.ps1 -ToolDirectory $toolDirectory)
          if ($LASTEXITCODE -ne 0) { throw "Pinned Inno Setup installation failed with exit $LASTEXITCODE." }
          $iscc = ($isccOutput | Select-Object -Last 1) -as [string]
          if ([string]::IsNullOrWhiteSpace($iscc) -or -not (Test-Path -LiteralPath $iscc -PathType Leaf)) {
            throw "Pinned Inno Setup did not return a valid ISCC path."
          }
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "ISCC_EXE=$iscc" + [Environment]::NewLine, $utf8NoBom)

      - name: Build versioned release pack and installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:WIN7POS_DOTNET_EXE = (Get-Command dotnet -ErrorAction Stop).Source
          & pwsh -NoProfile -File scripts/win7pos/windows/build-release-x86.ps1 -Configuration Release -Platform x86 -SkipRestore -BuildInstaller
          if ($LASTEXITCODE -ne 0) { throw "Canonical x86 release build failed with exit $LASTEXITCODE." }

          $zip = "dist/Win7POS-$env:WIN7POS_BUILD_VERSION-x86.zip"
          if (Test-Path -LiteralPath $zip) { Remove-Item -LiteralPath $zip -Force }
          Compress-Archive -Path "dist/Win7POS/*" -DestinationPath $zip -Force

          $installer = "installer/output/$env:WIN7POS_INSTALLER_BASE_FILENAME.exe"
          if (-not (Test-Path -LiteralPath $installer -PathType Leaf)) {
            throw "Fresh versioned installer is missing: $installer"
          }
          & pwsh -NoProfile -File scripts/check-release-pack-completeness.ps1 -ReleasePackSource $zip -ExpectedCommitSha $env:WIN7POS_EXACT_SHA
          if ($LASTEXITCODE -ne 0) { throw "Versioned release pack completeness check failed." }
          & pwsh -NoProfile -File scripts/check-win7-runtime-release-validation.ps1 -ReleasePackSource $zip -ExpectedCommitSha $env:WIN7POS_EXACT_SHA
          if ($LASTEXITCODE -ne 0) { throw "Versioned Win7 runtime closure validation failed." }
          & pwsh -NoProfile -File scripts/check-pos-online-linking-task084b.ps1 -ReleasePackSource $zip
          if ($LASTEXITCODE -ne 0) { throw "Versioned online-linking validation failed." }

          $hashLines = @(
            "$((Get-FileHash -LiteralPath $installer -Algorithm SHA256).Hash.ToLowerInvariant())  $([System.IO.Path]::GetFileName($installer))",
            "$((Get-FileHash -LiteralPath $zip -Algorithm SHA256).Hash.ToLowerInvariant())  $([System.IO.Path]::GetFileName($zip))"
          )
          [System.IO.File]::WriteAllLines(
            "dist/RELEASE-ARTIFACTS-SHA256.txt",
            $hashLines,
            (New-Object System.Text.UTF8Encoding($false)))

      - name: Upload installer artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ env.WIN7POS_INSTALLER_BASE_FILENAME }}
          path: installer/output/${{ env.WIN7POS_INSTALLER_BASE_FILENAME }}.exe
          if-no-files-found: error
          retention-days: 14

      - name: Upload dist artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: Win7POS-${{ env.WIN7POS_BUILD_VERSION }}-dist
          path: dist/Win7POS
          if-no-files-found: error
          retention-days: 14

      - name: Upload release pack artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: Win7POS-${{ env.WIN7POS_BUILD_VERSION }}-ReleasePack-x86
          path: |
            dist/Win7POS-${{ env.WIN7POS_BUILD_VERSION }}-x86.zip
            dist/RELEASE-ARTIFACTS-SHA256.txt
          if-no-files-found: error
          retention-days: 14
