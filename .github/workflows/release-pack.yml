name: Release Pack

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pack:
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: "true"
      DOTNET_CLI_TELEMETRY_OPTOUT: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup deterministic .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.301"

      - name: Print .NET info
        run: dotnet --info

      - name: Restore solution
        run: dotnet restore Win7POS.slnx

      - name: Run canonical required gates
        shell: pwsh
        run: pwsh -NoProfile -File scripts/check-required-gates.ps1

      - name: Build solution Release
        run: dotnet build Win7POS.slnx -c Release --no-restore

      - name: Test Core and Data
        run: dotnet test tests/Win7POS.Core.Tests/Win7POS.Core.Tests.csproj -c Release --no-build --no-restore

      - name: CLI selftest
        run: dotnet run --project src/Win7POS.Cli/Win7POS.Cli.csproj -c Release --no-build -- --selftest --keepdb

      - name: Build WPF Release x86
        run: dotnet build src/Win7POS.Wpf/Win7POS.Wpf.csproj -c Release -p:Platform=x86 -p:PlatformTarget=x86 --no-restore

      - name: Prepare and validate dist
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          function Invoke-CheckedProcess {
            param([string]$FilePath, [string[]]$ArgumentList)
            & $FilePath @ArgumentList
            if ($LASTEXITCODE -ne 0) {
              throw "Process failed with exit ${LASTEXITCODE}: $FilePath $($ArgumentList -join ' ')"
            }
          }
          if (Test-Path "dist/Win7POS") { Remove-Item -LiteralPath "dist/Win7POS" -Recurse -Force }
          New-Item -ItemType Directory -Force -Path "dist/Win7POS" | Out-Null

          $wpfOutput = "src/Win7POS.Wpf/bin/x86/Release/net48"
          if (!(Test-Path (Join-Path $wpfOutput "Win7POS.Wpf.exe"))) { throw "WPF x86 net48 output folder not found: $wpfOutput" }
          Copy-Item -Path (Join-Path $wpfOutput "*") -Destination "dist/Win7POS" -Recurse -Force
          Get-ChildItem -Path "dist/Win7POS" -Recurse -File -Filter "*.pdb" | Remove-Item -Force

          Invoke-CheckedProcess -FilePath "pwsh" -ArgumentList @(
            "-NoProfile", "-File", "scripts/win7pos/windows/write-release-support-files.ps1",
            "-OutputDirectory", "dist/Win7POS",
            "-Configuration", "Release",
            "-Platform", "x86",
            "-SdkVersion", "10.0.301",
            "-CommitSha", $env:GITHUB_SHA,
            "-Ref", $env:GITHUB_REF_NAME,
            "-GitHubRunNumber", $env:GITHUB_RUN_NUMBER)

          Invoke-CheckedProcess -FilePath "pwsh" -ArgumentList @("-NoProfile", "-File", "scripts/check-release-pack-completeness.ps1", "-ReleasePackSource", "dist/Win7POS", "-WriteManifests", "-ExpectedCommitSha", $env:GITHUB_SHA)
          Invoke-CheckedProcess -FilePath "pwsh" -ArgumentList @("-NoProfile", "-File", "scripts/check-required-gates.ps1", "-ReleasePackSource", "dist/Win7POS", "-ExpectedCommitSha", $env:GITHUB_SHA)

          $stamp = Get-Date -Format "yyyyMMdd_HHmm"
          $zip = "dist/Win7POS_$stamp.zip"
          if (Test-Path $zip) { Remove-Item -LiteralPath $zip -Force }
          Compress-Archive -Path "dist/Win7POS/*" -DestinationPath $zip -Force
          Invoke-CheckedProcess -FilePath "pwsh" -ArgumentList @("-NoProfile", "-File", "scripts/check-win7-runtime-release-validation.ps1", "-ReleasePackSource", $zip, "-ExpectedCommitSha", $env:GITHUB_SHA)
          Invoke-CheckedProcess -FilePath "pwsh" -ArgumentList @("-NoProfile", "-File", "scripts/check-pos-online-linking-task084b.ps1", "-ReleasePackSource", $zip)
          Write-Host "Created package: $zip"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $candidates = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles}\Inno Setup 6\ISCC.exe",
            "${env:LOCALAPPDATA}\Programs\Inno Setup 6\ISCC.exe"
          )
          $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (!$iscc) {
            & choco install innosetup --yes --no-progress
            if ($LASTEXITCODE -notin @(0, 1641, 3010)) {
              throw "Chocolatey failed to install Inno Setup (exit $LASTEXITCODE)."
            }
            $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          }

          if (!(Test-Path $iscc)) { throw "ISCC not found: $iscc" }
          $isccVersion = (Get-Item $iscc).VersionInfo.FileVersion
          if ([string]::IsNullOrWhiteSpace($isccVersion)) { throw "ISCC version metadata missing: $iscc" }
          "ISCC_EXE=$iscc" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "ISCC ready: $iscc (version $isccVersion)"

      - name: Build Installer (Inno Setup)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (!(Test-Path $env:ISCC_EXE)) { throw "ISCC not found: $env:ISCC_EXE" }
          $installerOutput = "installer/output/Win7POS-Setup.exe"
          if (Test-Path -LiteralPath $installerOutput) { Remove-Item -LiteralPath $installerOutput -Force }
          & $env:ISCC_EXE "installer/Win7POS.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit $LASTEXITCODE" }
          if (!(Test-Path -LiteralPath $installerOutput -PathType Leaf)) { throw "Fresh installer output missing: $installerOutput" }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: Win7POS-Setup
          path: installer/output/Win7POS-Setup.exe
          if-no-files-found: error
          retention-days: 14

      - name: Upload dist artifact
        uses: actions/upload-artifact@v6
        with:
          name: Win7POS-dist
          path: dist/Win7POS
          if-no-files-found: error
          retention-days: 14

      - name: Upload release pack artifact
        uses: actions/upload-artifact@v6
        with:
          name: Win7POS-ReleasePack-x86
          path: dist/Win7POS_*.zip
          if-no-files-found: error
          retention-days: 14
