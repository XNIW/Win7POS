name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build-and-check:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Resolve exact-SHA build version
        shell: pwsh
        env:
          WIN7POS_EXACT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: pwsh -NoProfile -File scripts/win7pos/windows/resolve-release-version.ps1 -CommitSha $env:WIN7POS_EXACT_SHA -Ref $env:GITHUB_REF -GitHubEnvironmentFile $env:GITHUB_ENV

      - name: Setup .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json

      - name: Print .NET info
        run: dotnet --info

      - name: Restore solution
        run: dotnet restore Win7POS.slnx --locked-mode

      - name: Canonical required gates
        shell: pwsh
        run: pwsh -NoProfile -File scripts/check-required-gates.ps1

      - name: Build solution (Release)
        run: dotnet build Win7POS.slnx -c Release --no-restore

      - name: Test Core/Data
        run: dotnet test tests/Win7POS.Core.Tests/Win7POS.Core.Tests.csproj -c Release --no-build --no-restore --logger "trx;LogFileName=Win7POS.Core.Tests.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: Win7POS-Core-TestResults-${{ github.run_id }}
          path: tests/Win7POS.Core.Tests/TestResults/*.trx
          if-no-files-found: error
          retention-days: 14

      - name: Selftest (fast)
        run: dotnet run --project src/Win7POS.Cli/Win7POS.Cli.csproj -c Release --no-build --no-restore -- --selftest --keepdb

      - name: Build WPF (Release x86)
        run: dotnet build src/Win7POS.Wpf/Win7POS.Wpf.csproj -c Release -p:Platform=x86 -p:PlatformTarget=x86 --no-restore
